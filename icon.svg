<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 배경: 둥근 사각형 (크림) -->
  <rect width="128" height="128" rx="20" fill="#FAF9F6"/>
  <rect width="128" height="128" rx="20" fill="none" stroke="#E3DFD8" stroke-width="2"/>

  <!-- 불씨(Ember) 심볼 — 3겹 화염 -->
  <!-- 외곽 화염 (연한 테라코타) -->
