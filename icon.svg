    C52 36, 30 50, 30 70
    C30 92, 45 110, 64 110
    C83 110, 98 92, 98 70
    C98 50, 76 36, 64 18Z"
    fill="#D97757" opacity="0.3"/>

  <!-- 중간 화염 (테라코타) -->
  <path d="M64 32
    C55 46, 40 56, 40 72
    C40 90, 50 102, 64 102
    C78 102, 88 90, 88 72
    C88 56, 73 46, 64 32Z"
    fill="#D97757" opacity="0.6"/>

  <!-- 내부 화염 (진한 테라코타) -->
  <path d="M64 48
    C58 58, 50 64, 50 76
    C50 88, 56 94, 64 94
    C72 94, 78 88, 78 76
    C78 64, 70 58, 64 48Z"
